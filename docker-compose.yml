services:
  reverse-proxy:
    image: nginx:alpine
    ports:
      - "8081:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - api
    networks:
      - dmz

  api:
    build: ./api
    networks:
      - dmz
      - internal
    environment:
      - DB_HOST=db
      - DB_USER=sa
      - DB_PASS=${DB_PASS}

  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      - ACCEPT_EULA=Y
      - MSSQL_SA_PASSWORD=${DB_PASS}
    volumes:
      - dbdata:/var/opt/mssql
    networks:
      - internal

networks:
  dmz:
  internal:

volumes:
  dbdata:
